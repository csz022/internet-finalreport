{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SEVENTEEN 成員介紹</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body style="background: linear-gradient(120deg, #f7c5cc 0%, #b3c7e6 100%); min-height: 100vh;">

    <div class="container py-5">
        <div class="text-center mb-4">
    <img src="{% static '686476.png' %}" alt="SEVENTEEN 成員介紹" class="img-fluid" style="max-width: 500px;">
</div>
<div class="mb-3 text-end">
    {% if user.is_authenticated %}
        <span>歡迎，{{ user.username }}！</span>
        <a href="{% url 'logout' %}" class="btn btn-outline-secondary btn-sm">登出</a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary btn-sm">登入</a>
    {% endif %}
</div>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            {% for member in members %}
            <div class="col">
    <a href="{% url 'member_detail' member.id %}" class="text-decoration-none text-dark">
        <div class="card h-100 shadow-sm">
            <img src="{{ member.photo.url }}" class="card-img-top object-fit-cover" alt="{{ member.name }}" style="height: 500px; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title">{{ member.name }}（{{ member.unit }}）</h5>
            </div>
        </div>
    </a>
</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
