<!DOCTYPE html>
<html>
<head>
    <title>註冊新帳號</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: linear-gradient(120deg, #f7c5cc 0%, #b3c7e6 100%); min-height: 100vh; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow p-4" style="max-width: 400px; width: 100%;">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">註冊新帳號</h4>
        </div>
        <div class="card-body">
            {% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} text-center py-2 mb-3" style="font-weight:bold;">{{ message }}</div>
    {% endfor %}
{% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">帳號</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密碼</label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">暱稱</label>
                    <input type="text" name="nickname" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">信箱</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">註冊</button>
            </form>
            <div class="text-center mt-3">
                已有帳號？<a href="{% url 'login' %}">登入</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
