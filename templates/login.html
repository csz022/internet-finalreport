{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>會員登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }
        .bg-cover {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            background: url("{% static '683743.jpg' %}") center center/cover no-repeat;
        }
        .login-center {
            min-height: 100vh;
            z-index: 1;
            position: relative;
            box-sizing: border-box;
        }
        .login-card {
            background: rgba(255,255,255,0.85);
            box-shadow: 0 2px 24px rgba(0,0,0,0.15);
            border-radius: 12px;
            margin-top: 420px;
            margin-bottom: 42px;
        }
        @media (max-width: 576px) {
            .login-card {
                margin-top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="bg-cover"></div>
    <div class="container login-center d-flex justify-content-center">
        <div class="card login-card p-4" style="max-width: 380px; width: 100%;">
            <div class="card-header bg-primary text-white text-center rounded-3">
                <h4 class="mb-0">會員登入</h4>
            </div>
            <div class="card-body">
                {% if form.errors %}
                    <div class="alert alert-danger text-center py-2 mb-3">
                        帳號或密碼錯誤，請再試一次。
                    </div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">帳號</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">密碼</label>
                        {{ form.password }}
                    </div>
                    <div class="mb-3">
                        {{ form.captcha.label_tag }}
                        {{ form.captcha }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登入</button>
                </form>
            <div class="text-center mt-3">
                還沒有帳號？<a href="{% url 'register' %}" class="btn btn-outline-primary w-100 mt-2">註冊</a>
            </div>
            </div>
        </div>
    </div>
    <script>
      
      window.onload = function() {
        var user = document.getElementById('id_username');
        var pwd = document.getElementById('id_password');
        if(user) user.classList.add('form-control');
        if(pwd) pwd.classList.add('form-control');
      };
    </script>
</body>
</html>
